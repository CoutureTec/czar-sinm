name: Testes de Integração

# Executa os exemplos contra a API real (ambiente hml).
#
# ATENÇÃO: secrets não são repassados em PRs de forks externos — apenas
# para branches do próprio repositório. PRs de forks serão ignorados.
#
# Segredos necessários (Settings → Secrets and variables → Actions):
#   SINM_USERNAME
#   SINM_PASSWORD
#   SINM_CLIENT_ID
#   SINM_CLIENT_SECRET

on:
  pull_request:
    branches: [main]
  # Permite disparar manualmente pelo GitHub Actions UI
  workflow_dispatch:

jobs:
  integration:
    name: Exemplos contra API hml
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar se secrets estão disponíveis
        env:
          SECRET: ${{ secrets.SINM_USERNAME }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "::error::Secrets não configurados. Configure SINM_USERNAME, SINM_PASSWORD, SINM_CLIENT_ID e SINM_CLIENT_SECRET em Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Criar .env para dados_auto_contidos
        run: |
          cat > exemplos/dados_auto_contidos/.env <<EOF
          SINM_AMBIENTE=hml
          SINM_USERNAME=${{ secrets.SINM_USERNAME }}
          SINM_PASSWORD=${{ secrets.SINM_PASSWORD }}
          SINM_CLIENT_ID=${{ secrets.SINM_CLIENT_ID }}
          SINM_CLIENT_SECRET=${{ secrets.SINM_CLIENT_SECRET }}
          EOF

      - name: Criar .env para dados_externos
        run: |
          cat > exemplos/dados_externos/.env <<EOF
          SINM_AMBIENTE=hml
          SINM_USERNAME=${{ secrets.SINM_USERNAME }}
          SINM_PASSWORD=${{ secrets.SINM_PASSWORD }}
          SINM_CLIENT_ID=${{ secrets.SINM_CLIENT_ID }}
          SINM_CLIENT_SECRET=${{ secrets.SINM_CLIENT_SECRET }}
          EOF

      - name: Exemplo dados_auto_contidos — fluxo completo
        working-directory: exemplos/dados_auto_contidos
        run: python example.py

      - name: Exemplo dados_externos — fluxo completo
        working-directory: exemplos/dados_externos
        run: python example.py --dados dados/processo_001

      - name: Limpar arquivos .env
        if: always()
        run: |
          rm -f exemplos/dados_auto_contidos/.env
          rm -f exemplos/dados_externos/.env
