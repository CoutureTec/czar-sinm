name: Release

# Dispara quando uma tag v* é publicada (ex: v0.2.0).
# Roda testes unitários e de integração antes de criar a release.
# Se qualquer teste falhar, a release NÃO é criada.

on:
  push:
    tags:
      - "v*"

jobs:
  # ------------------------------------------------------------------
  # 1. Testes unitários (sem credenciais, rápido)
  # ------------------------------------------------------------------
  unit:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Executar testes unitários
        run: pytest --tb=short -q

  # ------------------------------------------------------------------
  # 2. Testes de integração (requer secrets)
  # ------------------------------------------------------------------
  integration:
    name: Testes de integração
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar se secrets estão disponíveis
        env:
          SECRET: ${{ secrets.ZARCNM_USERNAME }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "::error::Secrets não configurados. A release não pode ser criada sem validar a integração."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Criar .env para dados_auto_contidos
        run: |
          cat > exemplos/dados_auto_contidos/.env <<EOF
          ZARCNM_AMBIENTE=hml
          ZARCNM_USERNAME=${{ secrets.ZARCNM_USERNAME }}
          ZARCNM_PASSWORD=${{ secrets.ZARCNM_PASSWORD }}
          ZARCNM_CLIENT_ID=${{ secrets.ZARCNM_CLIENT_ID }}
          ZARCNM_CLIENT_SECRET=${{ secrets.ZARCNM_CLIENT_SECRET }}
          EOF

      - name: Criar .env para dados_externos
        run: |
          cat > exemplos/dados_externos/.env <<EOF
          ZARCNM_AMBIENTE=hml
          ZARCNM_USERNAME=${{ secrets.ZARCNM_USERNAME }}
          ZARCNM_PASSWORD=${{ secrets.ZARCNM_PASSWORD }}
          ZARCNM_CLIENT_ID=${{ secrets.ZARCNM_CLIENT_ID }}
          ZARCNM_CLIENT_SECRET=${{ secrets.ZARCNM_CLIENT_SECRET }}
          EOF

      - name: Exemplo dados_auto_contidos — fluxo completo
        working-directory: exemplos/dados_auto_contidos
        run: python example.py

      - name: Exemplo dados_externos — fluxo completo
        working-directory: exemplos/dados_externos
        run: python example.py --dados dados/processo_001

      - name: Limpar arquivos .env
        if: always()
        run: |
          rm -f exemplos/dados_auto_contidos/.env
          rm -f exemplos/dados_externos/.env

  # ------------------------------------------------------------------
  # 3. Cria a release — só executa se os dois jobs anteriores passarem
  # ------------------------------------------------------------------
  release:
    name: Criar release no GitHub
    runs-on: ubuntu-latest
    needs: [unit, integration]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # ------------------------------------------------------------------
  # 4. Publica no PyPI — só executa após a release ser criada
  #
  # Usa Trusted Publisher (OIDC) — sem API token armazenado como secret.
  # Configuração única no PyPI:
  #   pypi.org → Account → Publishing → Add trusted publisher
  #   owner: CoutureTec | repo: czar-nm | workflow: release.yml | env: pypi
  # ------------------------------------------------------------------
  pypi:
    name: Publicar no PyPI
    runs-on: ubuntu-latest
    needs: [release]
    environment: pypi

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar build
        run: pip install build

      - name: Construir pacote
        run: python -m build

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
