name: Racional do Cálculo (Exemplo 05)

# Executa exemplos/05_racional/exemplo.py com as credenciais e a chave
# informadas via formulário: autentica via ROPC (usuário/senha/client) e
# imprime o racional do cálculo da classificação.
# Senha e client_secret são mascarados nos logs.
#
# Disparo: Actions → "Racional do Cálculo (Exemplo 05)" → Run workflow

on:
  workflow_dispatch:
    inputs:
      sinm_ambiente:
        description: 'Ambiente'
        required: true
        default: 'hml'
        type: choice
        options:
          - hml
          - prd
      sinm_username:
        description: 'Usuário (email)'
        required: true
        type: string
      sinm_password:
        description: 'Senha (mascarada nos logs)'
        required: true
        type: string
      sinm_client_id:
        description: 'Client ID Keycloak (CNPJ sem máscara, ex: 41483879000157)'
        required: true
        type: string
      sinm_client_secret:
        description: 'Client Secret Keycloak (chave secreta do client)'
        required: true
        type: string
      chave:
        description: 'chaveClassificacaoNM a consultar'
        required: true
        type: string
      sinm_grant_type:
        description: 'Grant Type (opcional, padrão=password/ROPC)'
        required: false
        default: 'password'
        type: choice
        options:
          - password
          - client_credentials
      formato_json:
        description: 'Imprimir JSON cru em vez do relatório'
        required: false
        default: false
        type: boolean

jobs:
  racional:
    name: Racional do Cálculo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Mascarar dados sensíveis
        run: |
          echo "::add-mask::${{ inputs.sinm_password }}"
          echo "::add-mask::${{ inputs.sinm_client_secret }}"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Consultar racional
        working-directory: exemplos/05_racional
        env:
          SINM_AMBIENTE: ${{ inputs.sinm_ambiente }}
          SINM_USERNAME: ${{ inputs.sinm_username }}
          SINM_PASSWORD: ${{ inputs.sinm_password }}
          SINM_CLIENT_ID: ${{ inputs.sinm_client_id }}
          SINM_CLIENT_SECRET: ${{ inputs.sinm_client_secret }}
          SINM_GRANT_TYPE: ${{ inputs.sinm_grant_type }}
        run: |
          if [ "${{ inputs.formato_json }}" = "true" ]; then
            python exemplo.py --chave "${{ inputs.chave }}" --json
          else
            python exemplo.py --chave "${{ inputs.chave }}"
          fi
